<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kosei Gaming Lab | OW2 VOD診断ダッシュボード v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090F;--bg2:#0C1018;--card:#0F1624;--card2:#141D2E;
  --border:#1C2A40;--border2:#253850;
  --orange:#F97316;--blue:#38BDF8;--purple:#A855F7;
  --gold:#EAB308;--green:#22C55E;--red:#EF4444;--cyan:#06B6D4;
  --text:#E2E8F0;--text2:#94A3B8;--text3:#475569;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;font-size:14px}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:100;overflow-y:auto}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:rgba(7,9,15,0.95);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
.content{padding:20px;flex:1}
.logo{padding:16px;border-bottom:1px solid var(--border)}
.logo-name{font-size:12px;font-weight:900;letter-spacing:3px;color:var(--orange);text-transform:uppercase}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:2px;margin-top:2px;text-transform:uppercase}
.nav{padding:10px 6px;flex:1}
.nav-section-title{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;padding:6px 8px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--text2);border:1px solid transparent;margin-bottom:1px;transition:all .15s;user-select:none}
.nav-item:hover{background:rgba(56,189,248,.07);color:var(--text)}
.nav-item.active{background:rgba(249,115,22,.12);color:var(--orange);border-color:rgba(249,115,22,.25)}
.nav-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);line-height:1.5}
.topbar-title{font-size:13px;font-weight:700;color:var(--blue);letter-spacing:.5px}
.topbar-right{display:flex;align-items:center;gap:10px}
.rank-badge{background:linear-gradient(135deg,#D97706,#F59E0B);color:#000;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:1px}
.score-chip{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--orange),var(--blue),var(--purple));opacity:.6}
.card-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';width:2px;height:12px;background:var(--orange);border-radius:2px;display:inline-block;flex-shrink:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;transition:transform .2s}
.sc:hover{transform:translateY(-2px)}
.sc-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.sc-val{font-size:30px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-1px}
.sc-sub{font-size:10px;color:var(--text3);margin-top:5px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;letter-spacing:.3px}
.btn-p{background:linear-gradient(135deg,var(--orange),#DC2626);color:#fff}
.btn-p:hover{opacity:.9;transform:translateY(-1px)}
.btn-s{background:rgba(56,189,248,.1);color:var(--blue);border:1px solid rgba(56,189,248,.25)}
.btn-s:hover{background:rgba(56,189,248,.18)}
.btn-g{background:rgba(255,255,255,.04);color:var(--text2);border:1px solid var(--border)}
.btn-g:hover{background:rgba(255,255,255,.08);color:var(--text)}
.btn-grn{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px}
.t-o{background:rgba(249,115,22,.14);color:var(--orange);border:1px solid rgba(249,115,22,.28)}
.t-b{background:rgba(56,189,248,.1);color:var(--blue);border:1px solid rgba(56,189,248,.22)}
.t-p{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.22)}
.t-g{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.22)}
.t-r{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.22)}
.t-gold{background:rgba(234,179,8,.1);color:var(--gold);border:1px solid rgba(234,179,8,.22)}
.pb-wrap{margin-bottom:10px}
.pb-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.pb-name{color:var(--text2)}
.pb-val{font-weight:700;font-variant-numeric:tabular-nums}
.pb{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;transition:width .8s ease}
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:700;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px}
.fi,.fs,.ft{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-size:13px;transition:all .15s;outline:none}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(56,189,248,.1)}
.fs option{background:#141D2E;color:var(--text)}
.ft{resize:vertical;min-height:72px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:rgba(255,255,255,.03);padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:9px 12px;font-size:11px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text2)}
.tbl tr:hover td{background:rgba(56,189,248,.03)}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.a-warn{background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.18);color:var(--gold)}
.a-info{background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.18);color:var(--blue)}
.a-ok{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.18);color:var(--green)}
.a-err{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);color:var(--red)}
.hc{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:14px;margin-bottom:12px;border-left:3px solid var(--purple)}
.conf-bar{display:flex;align-items:center;gap:8px;margin-top:10px}
.conf-track{flex:1;height:4px;background:rgba(255,255,255,.05);border-radius:2px}
.conf-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--purple),var(--blue))}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.st{font-size:18px;font-weight:800;letter-spacing:.3px}
.tl-row{display:flex;gap:12px;margin-bottom:8px;align-items:flex-start;padding:10px;border-radius:8px;background:var(--card2);border:1px solid var(--border)}
.tl-time{font-size:11px;font-weight:700;color:var(--blue);font-variant-numeric:tabular-nums;min-width:48px;margin-top:2px}
.tl-body{flex:1}
.tl-evt{font-size:12px;font-weight:700;margin-bottom:3px}
.tl-note{font-size:11px;color:var(--text3);line-height:1.5}
.badge-new{background:linear-gradient(135deg,var(--orange),var(--purple));color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:20px;letter-spacing:1px;vertical-align:middle;margin-left:5px}
.imp-task{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;cursor:pointer;border:1px solid var(--border);background:var(--card2);margin-bottom:6px;transition:all .15s;font-size:12px;color:var(--text2)}
.imp-task:hover{border-color:var(--blue);color:var(--text)}
.imp-task.done{opacity:.55;text-decoration:line-through}
.chk{width:16px;height:16px;border-radius:4px;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:var(--green);transition:all .15s}
.chk.on{background:var(--green);border-color:var(--green);color:#000}
.export-pre{font-family:'Courier New',monospace;font-size:11px;color:var(--text2);line-height:1.7;white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.3);padding:14px;border-radius:7px;max-height:400px;overflow-y:auto;border:1px solid var(--border)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#000;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
/* VIDEO PAGE */
.video-drop{border:2px dashed var(--border2);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;background:var(--card);position:relative}
.video-drop:hover,.video-drop.drag-over{border-color:var(--orange);background:rgba(249,115,22,.05)}
.video-drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.video-wrap{position:relative;background:#000;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.video-wrap video{width:100%;max-height:360px;display:block}
.video-controls{background:var(--bg2);border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.vc-time{font-size:12px;font-weight:700;color:var(--blue);font-variant-numeric:tabular-nums;min-width:80px}
.vc-progress{flex:1;min-width:120px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;cursor:pointer;position:relative}
.vc-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--blue));border-radius:3px;pointer-events:none;transition:width .1s}
.hotkey-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.hk{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;transition:all .15s}
.hk.active-key{background:rgba(249,115,22,.2);border-color:var(--orange);transform:scale(1.05)}
.hk-key{font-size:18px;font-weight:900;color:var(--orange);display:block;margin-bottom:3px}
.hk-label{font-size:10px;color:var(--text3)}
.evt-list{max-height:280px;overflow-y:auto}
.evt-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card2);margin-bottom:4px;font-size:11px}
.evt-ts{font-weight:700;color:var(--blue);font-variant-numeric:tabular-nums;min-width:52px}
.evt-type{font-weight:700;min-width:60px}
.evt-del{color:var(--red);cursor:pointer;margin-left:auto;padding:2px 6px;border-radius:4px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);font-size:10px}
/* VIDEO TIMELINE */
.vtl{position:relative;height:40px;background:rgba(0,0,0,.3);border-radius:6px;border:1px solid var(--border);overflow:hidden;cursor:pointer;margin-top:6px}
.vtl-marker{position:absolute;top:0;bottom:0;width:3px;border-radius:2px;transform:translateX(-50%)}
.vtl-tooltip{position:absolute;bottom:calc(100%+4px);background:var(--card);border:1px solid var(--border);padding:3px 7px;border-radius:4px;font-size:10px;white-space:nowrap;pointer-events:none;transform:translateX(-50%)}
/* STATS PAGE */
.kpi-card{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:14px;display:flex;flex-direction:column;gap:4px}
.kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.kpi-val{font-size:24px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1}
.kpi-bench{font-size:10px;margin-top:3px}
.kpi-pass{color:var(--green)}
.kpi-fail{color:var(--red)}
.kpi-warn{color:var(--gold)}
.bench-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:7px;border:1px solid var(--border);background:var(--card2);margin-bottom:5px;font-size:12px}
.bench-name{color:var(--text2);flex:1}
.bench-target{color:var(--text3);font-size:11px;min-width:90px;text-align:center}
.bench-actual{font-weight:800;font-variant-numeric:tabular-nums;min-width:70px;text-align:right}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:6px}
/* KNOWLEDGE PAGE */
.rank-bar-wrap{margin-bottom:6px}
.rank-bar{height:22px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;color:#fff;min-width:20px;transition:width .8s ease;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.ws-code{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ws-code-val{font-size:20px;font-weight:900;letter-spacing:4px;color:var(--gold);font-family:'Courier New',monospace}
.ws-code-desc{font-size:11px;color:var(--text3);margin-top:2px}
.copy-btn{font-size:10px;padding:4px 10px;border-radius:5px;background:rgba(234,179,8,.1);color:var(--gold);border:1px solid rgba(234,179,8,.2);cursor:pointer}
.death-type-card{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:14px;border-left:3px solid var(--red);margin-bottom:8px}
.vpos-result{font-size:36px;font-weight:900;font-variant-numeric:tabular-nums;text-align:center;padding:16px;background:var(--card2);border-radius:8px;border:1px solid var(--border)}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-name">⚡ Kosei Gaming</div>
      <div class="logo-sub">OW2 Coaching Lab v3</div>
    </div>
    <div class="nav" id="nav"></div>
    <div class="sidebar-footer">
      ランク代行・アカウント共有・<br>チート支援は一切行いません
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Overview</div>
      <div class="topbar-right">
        <div class="rank-badge" id="topbar-rank">GOLD</div>
        <div class="score-chip" id="topbar-score" style="color:var(--gold)">--/100</div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const RANKS=['Bronze 5','Bronze 4','Bronze 3','Bronze 2','Bronze 1','Silver 5','Silver 4','Silver 3','Silver 2','Silver 1','Gold 5','Gold 4','Gold 3','Gold 2','Gold 1','Platinum 5','Platinum 4','Platinum 3','Platinum 2','Platinum 1','Diamond 5','Diamond 4','Diamond 3','Diamond 2','Diamond 1','Master','Grandmaster','Champion'];
const ROLES=['Tank','Damage','Support'];
const EVT_TYPES={
  death:{label:'💀 デス',color:'var(--red)'},
  kill:{label:'⚔️ キル',color:'var(--orange)'},
  goodPos:{label:'✅ 良ポジ',color:'var(--green)'},
  badPos:{label:'⚠️ 悪ポジ',color:'var(--gold)'},
  lateReset:{label:'🔄 リセット遅',color:'var(--purple)'},
  ultUsed:{label:'💥 ウルト',color:'var(--blue)'},
  abilityWasted:{label:'🚫 CD無駄',color:'var(--red)'},
  goodDecision:{label:'🎯 判断良',color:'var(--cyan)'},
  clutch:{label:'🏆 クラッチ',color:'var(--gold)'},
};
const RANK_DIST=[
  {rank:'Bronze',pct:2.4,color:'#CD7F32'},{rank:'Silver',pct:12.6,color:'#C0C0C0'},
  {rank:'Gold',pct:31.7,color:'#FFD700'},{rank:'Platinum',pct:34.9,color:'#4FC3F7'},
  {rank:'Diamond',pct:14.9,color:'#4DD0E1'},{rank:'Master',pct:3.2,color:'#FF8C00'},
  {rank:'GM+Champion',pct:0.3,color:'#E040FB'},
];
const ANA_BENCHMARKS=[
  {key:'healing10m',label:'ヒーリング /10分',target:7411,unit:'/10m',dir:'gte',role:'Support/Ana'},
  {key:'deaths10m',label:'デス /10分',target:5.9,unit:'/10m',dir:'lte',role:'Support/Ana'},
  {key:'defAssists',label:'防御アシスト /10分',target:10.26,unit:'/10m',dir:'gte',role:'Support/Ana'},
  {key:'offAssists',label:'攻撃アシスト /10分',target:6.66,unit:'/10m',dir:'gte',role:'Support/Ana'},
  {key:'sleepDarts',label:'スリープダーツ /10分',target:2.84,unit:'/10m',dir:'gte',role:'Support/Ana'},
  {key:'nanoBoosts',label:'ナノブースト /10分',target:2.70,unit:'/10m',dir:'gte',role:'Support/Ana'},
];
const GENERAL_KPI=[
  {key:'elimsPerDeath',label:'エリミネーション/デス',target:3.0,unit:'',dir:'gte',desc:'プロ基準 ≥3.0'},
  {key:'finalBlowsPerDeath',label:'ファイナルブロー/デス',target:2.0,unit:'',dir:'gte',desc:'プロ基準 ≥2.0'},
  {key:'deaths10m',label:'デス /10分',target:5.0,unit:'/10m',dir:'lte',desc:'理想 <4.0, 上限 5.0'},
  {key:'assistsPerElim',label:'アシスト/エリミネーション',target:1.5,unit:'x',dir:'gte',desc:'サポート基準 ≥1.5'},
];
const WORKSHOP_CODES=[
  {code:'VAXTA',desc:'遮蔽物チャレンジ（Cover Training）',detail:'射線と遮蔽物の意識トレーニング'},
  {code:'THNX8',desc:'アイムトレーニング（Aim Lab OW2）',detail:'精密エイム・追跡練習'},
  {code:'4GAAD',desc:'ポジショニング練習（Positioning Workshop）',detail:'ポジション判断・リセット練習'},
  {code:'VXEAT',desc:'アビリティタイミング（Ability Timing Drill）',detail:'CD管理・コンボ最適化'},
];
const DEATH_TYPES=[
  {name:'空間把握エラー',en:'Spatial Error',icon:'📐',desc:'遮蔽物から1.5m以上離れた状態でのデス。射線内に立ち続けることが根本原因。',cue:'カバーチェックせず前進',fix:'歩くたびに「今遮蔽物から何歩？」を確認するルーティンを作る'},
  {name:'射線管理エラー',en:'Sightline Error',icon:'👁️',desc:'2本以上の射線にさらされた状態でのデス。角度管理の失敗。',cue:'1vs2の角度でスタック',fix:'常に1方向のみ敵に晒す。クリアリング順序を意識する'},
  {name:'リソース管理エラー',en:'Resource Error',icon:'⚡',desc:'防御CD（アンチ/フェード/シールド等）を使い切った状態でのデス。',cue:'キーCDを前のファイトで消費',fix:'CD温存ルール：自分に危険がない限りCD先打ちしない'},
];

// ============================================================
// DATABASE
// ============================================================
const DEFAULT_DATA={
  player:{playerName:'Player-001',discordName:'',contact:'',playHours:500,sensitivity:'5.0',platform:'PC',currentRank:'Gold 3',targetRank:'Platinum 2',role:'Support',mainHero:'Ana',coachingGoal:'遮蔽物管理とデス15秒前の意識を改善する',minorStatus:'adult',consentForAnonymousUse:false},
  scores:{death15:42,positioning:45,ability:55,heroPool:72,aim:60,teamfight:48,mental:68,training:50},
  events:[

function calcOverall(s){

function scoreColor(v){if(v>=75)return'var(--green)';if(v>=55)return'var(--blue)';if(v>=40)return'var(--gold)';return'var(--red)';}

// CHARTS (inline SVG)
// ============================================================
function radarChart(data,w,h){
  const cx=w/2,cy=h/2,r=Math.min(w,h)*0.38;
  const n=data.length;
  const angles=data.map((_,i)=>((i*2*Math.PI)/n)-Math.PI/2);
  const gridLevels=[20,40,60,80,100];
  let svg=`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">`;
  gridLevels.forEach(lv=>{
    const pts=angles.map(a=>`${cx+r*(lv/100)*Math.cos(a)},${cy+r*(lv/100)*Math.sin(a)}`).join(' ');
    svg+=`<polygon points="${pts}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
  });
  angles.forEach(a=>{svg+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`;});
  const pts=data.map((d,i)=>`${cx+r*(d.value/100)*Math.cos(angles[i])},${cy+r*(d.value/100)*Math.sin(angles[i])}`).join(' ');
  svg+=`<polygon points="${pts}" fill="rgba(56,189,248,0.18)" stroke="#38BDF8" stroke-width="2"/>`;
  data.forEach((d,i)=>{
    const x=cx+r*(d.value/100)*Math.cos(angles[i]),y=cy+r*(d.value/100)*Math.sin(angles[i]);
    svg+=`<circle cx="${x}" cy="${y}" r="4" fill="${scoreColor(d.value)}" stroke="var(--bg)" stroke-width="2"/>`;
    const lx=cx+(r+22)*Math.cos(angles[i]),ly=cy+(r+22)*Math.sin(angles[i]);
    svg+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#94A3B8">${d.label}</text>`;
    const vx=cx+(r*(d.value/100)+16)*Math.cos(angles[i]),vy=cy+(r*(d.value/100)+16)*Math.sin(angles[i]);
    svg+=`<text x="${vx}" y="${vy}" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="700" fill="${scoreColor(d.value)}">${d.value}</text>`;
  });
  svg+=`</svg>`;return svg;
}
function barChart(labels,values,colors,w,h){
  const pad={l:30,r:10,t:10,b:30};
  const bw=(w-pad.l-pad.r)/labels.length;
  const maxV=Math.max(...values,1);
  let svg=`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">`;
  [0,25,50,75,100].forEach(v=>{
    const y=pad.t+(h-pad.t-pad.b)*(1-v/100);
    svg+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
    svg+=`<text x="${pad.l-4}" y="${y}" text-anchor="end" dominant-baseline="middle" font-size="8" fill="#475569">${v}</text>`;
  });
  values.forEach((v,i)=>{
    const bh=(h-pad.t-pad.b)*(v/Math.max(maxV,100));
    const x=pad.l+i*bw+bw*0.15,y=h-pad.b-bh;
    const bwActual=bw*0.7;
    svg+=`<rect x="${x}" y="${y}" width="${bwActual}" height="${bh}" fill="${colors[i]||'#38BDF8'}" rx="3" opacity="0.85"/>`;
    svg+=`<text x="${x+bwActual/2}" y="${y-5}" text-anchor="middle" font-size="9" font-weight="700" fill="${colors[i]||'#38BDF8'}">${v}</text>`;
    svg+=`<text x="${x+bwActual/2}" y="${h-pad.b+12}" text-anchor="middle" font-size="8" fill="#475569">${labels[i]}</text>`;
  });
  svg+=`</svg>`;return svg;
}
function lineChart(points,w,h){
  if(!points||points.length<2)return`<svg viewBox="0 0 ${w} ${h}"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#475569" font-size="12">データなし</text></svg>`;
  const pad={l:30,r:15,t:15,b:25};
  const maxV=Math.max(...points.map(p=>p.v),1);
  const scaleX=(i)=>pad.l+(w-pad.l-pad.r)*(i/(points.length-1));
  const scaleY=(v)=>pad.t+(h-pad.t-pad.b)*(1-v/Math.max(maxV,100));
  const pathD=points.map((p,i)=>`${i?'L':'M'}${scaleX(i)},${scaleY(p.v)}`).join(' ');
  const areaD=pathD+` L${scaleX(points.length-1)},${h-pad.b} L${scaleX(0)},${h-pad.b} Z`;
  let svg=`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">`;
  svg+=`<defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#38BDF8" stop-opacity="0.3"/><stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/></linearGradient></defs>`;
  svg+=`<path d="${areaD}" fill="url(#lg)"/>`;
  svg+=`<path d="${pathD}" fill="none" stroke="#38BDF8" stroke-width="2.5" stroke-linejoin="round"/>`;
  points.forEach((p,i)=>{
    svg+=`<circle cx="${scaleX(i)}" cy="${scaleY(p.v)}" r="3.5" fill="${scoreColor(p.v)}" stroke="var(--bg)" stroke-width="1.5"/>`;
    svg+=`<text x="${scaleX(i)}" y="${h-pad.b+12}" text-anchor="middle" font-size="8" fill="#475569">${p.label}</text>`;
  });
  svg+=`</svg>`;return svg;
}
function circleRing(score,size){
  const r=(size-8)/2,cx=size/2,cy=size/2;
  const circ=2*Math.PI*r;
  const dash=circ*(score/100);
  const c=scoreColor(score);
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c}" stroke-width="6" stroke-dasharray="${dash} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
    <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="${size*0.22}" font-weight="900" fill="${c}">${score}</text>
  </svg>`;
}

function loadVideoFile(input){
  const file=input.files[0];if(!file)return;
  const url=URL.createObjectURL(file);
  const wrap=document.getElementById('video-player-wrap');
  const drop=document.getElementById('video-drop');
  drop.style.display='none';
  wrap.style.display='block';
  videoEl=document.getElementById('vod-video');
  videoEl.src=url;
  videoEl.addEventListener('timeupdate',updateVideoProgress);
  videoEl.addEventListener('loadedmetadata',()=>{
    document.getElementById('vc-total').textContent=fmtTime(videoEl.duration);
    updateVideoTimeline();
  });
  showToast('動画を読み込みました。再生してホットキーでタグ付けしてください！',3000);
}

function togglePlay(){
  if(!videoEl)return;
  if(videoEl.paused){videoEl.play();document.getElementById('play-btn').textContent='⏸ 停止';}
  else{videoEl.pause();document.getElementById('play-btn').textContent='▶ 再生';}
}
function setSpeed(v){
  if(videoEl)videoEl.playbackRate=parseFloat(v);
  const lbl=document.getElementById('vc-speed-label');
  if(lbl)lbl.textContent=v+'x';
}
function updateVideoProgress(){
  if(!videoEl)return;
  const pct=videoEl.duration?videoEl.currentTime/videoEl.duration*100:0;
  const fill=document.getElementById('vc-fill');
  const cur=document.getElementById('vc-current');
  if(fill)fill.style.width=pct+'%';
  if(cur)cur.textContent=fmtTime(videoEl.currentTime);
}
function seekVideo(e){
  if(!videoEl)return;
  const bar=document.getElementById('vc-progress');
  const rect=bar.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  videoEl.currentTime=pct*videoEl.duration;
}
function seekFromTimeline(e){
  if(!videoEl)return;
  const tl=document.getElementById('video-timeline');
  const rect=tl.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  videoEl.currentTime=pct*videoEl.duration;
}
function updateVideoTimeline(){
  const tl=document.getElementById('video-timeline');if(!tl)return;
  const evts=DB.videoEvents||[];
  const dur=videoEl?videoEl.duration:1;
  tl.innerHTML=evts.map(e=>{
    const pct=dur?(e.rawTime/dur*100):0;
    const et=EVT_TYPES[e.eventType]||{label:e.eventType,color:'var(--text3)'};
    return`<div class="vtl-marker" style="left:${pct}%;background:${et.color}" title="${e.timestamp} ${et.label}"></div>`;
  }).join('');
}

function tagVideoEvent(eventType,note=''){
  if(!videoEl)return;
  const t=videoEl.currentTime;
  const ev={id:Date.now(),timestamp:fmtTime(t),rawTime:t,eventType,note,source:'video'};
  if(!DB.videoEvents)DB.videoEvents=[];
  DB.videoEvents.push(ev);
  saveDB(DB);
  // flash hotkey
  const keyMap={death:'D',kill:'K',goodPos:'G',badPos:'B',lateReset:'L',ultUsed:'U',abilityWasted:'A',goodDecision:'J'};
  const hkEl=document.getElementById('hk-'+keyMap[eventType]);
  if(hkEl){hkEl.classList.add('active-key');setTimeout(()=>hkEl.classList.remove('active-key'),300);}
  // update list
  const listEl=document.getElementById('evt-list');
  if(listEl)listEl.innerHTML=renderVideoEventList();
  updateVideoTimeline();
  showToast(`🎯 ${EVT_TYPES[eventType]?.label||eventType} @ ${fmtTime(t)}`,1200);
}

function deleteVideoEvent(id){
  DB.videoEvents=(DB.videoEvents||[]).filter(e=>e.id!==id);
  saveDB(DB);
  const listEl=document.getElementById('evt-list');
  if(listEl)listEl.innerHTML=renderVideoEventList();
  updateVideoTimeline();
}
function clearVideoEvents(){
  if(!confirm('動画タグをすべてクリアしますか？'))return;
  DB.videoEvents=[];saveDB(DB);
  const listEl=document.getElementById('evt-list');
  if(listEl)listEl.innerHTML=renderVideoEventList();
  updateVideoTimeline();
}
function mergeVideoEvents(){
  const videoOnlyEvts=(DB.videoEvents||[]).filter(e=>e.source==='video');
  videoOnlyEvts.forEach(ve=>{
    if(!DB.events.find(e=>e.id===ve.id)){
      DB.events.push({...ve,cause15s:ve.note||'',directCause:'',coverDist:0,sightlines:0,cdWasted:false,inferredHabit:'',improvement:'',confidence:0});
    }
  });
  saveDB(DB);showToast(`${videoOnlyEvts.length}件をタイムラインに追加しました！`);
}
function exportVideoEvents(){
  const csv=['タイムスタンプ,秒数,イベントタイプ,メモ'].concat((DB.videoEvents||[]).map(e=>`${e.timestamp},${e.rawTime.toFixed(1)},${e.eventType},${e.note||''}`)).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='video_events.csv';a.click();showToast('CSVをエクスポートしました');

// VIDEO KEYBOARD HANDLER
const KEY_MAP={
  KeyD:'death',KeyK:'kill',KeyG:'goodPos',KeyB:'badPos',
  KeyL:'lateReset',KeyU:'ultUsed',KeyA:'abilityWasted',KeyJ:'goodDecision',
};
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(currentPage!=='video')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();return;}
  if(e.code==='ArrowRight'&&videoEl){videoEl.currentTime=Math.min(videoEl.duration,videoEl.currentTime+5);return;}
  if(e.code==='ArrowLeft'&&videoEl){videoEl.currentTime=Math.max(0,videoEl.currentTime-5);return;}
  if(KEY_MAP[e.code]){e.preventDefault();tagVideoEvent(KEY_MAP[e.code]);}
});

function pageStats(){
  const ms=DB.matchStats||{};
  const dur=parseFloat(ms.matchDuration||9);
  function per10(v){return dur>0?Math.round((parseFloat(v||0)/dur)*10*10)/10:0;}
  const kpis={
    elimsPerDeath:ms.deaths>0?Math.round((ms.elims||0)/(ms.deaths||1)*10)/10:0,
    finalBlowsPerDeath:ms.deaths>0?Math.round((ms.finalBlows||0)/(ms.deaths||1)*10)/10:0,
    deaths10m:per10(ms.deaths),
    assistsPerElim:ms.elims>0?Math.round((ms.assists||0)/(ms.elims||1)*10)/10:0,
    healing10m:per10(ms.healing),
    defAssists:per10(ms.defAssists||0),
    offAssists:per10(ms.offAssists||0),
    sleepDarts:per10(ms.sleepDarts||0),
    nanoBoosts:per10(ms.nanoBoosts||0),
  };

  function bench(kpiKey,val,benchmarks){
    const b=benchmarks.find(x=>x.key===kpiKey);if(!b)return{pass:null,target:null};
    const pass=b.dir==='gte'?val>=b.target:val<=b.target;
    return{pass,target:b.target,unit:b.unit};
  }
  function kpiRow(label,val,bKey,benchArr,desc){
    const {pass,target,unit}=bench(bKey,val,benchArr);
    const color=pass===null?'var(--text)':pass?'var(--green)':'var(--red)';
    const icon=pass===null?'—':pass?'✅':'❌';
    return`<div class="bench-row">
      <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0;margin-right:8px"></div>
      <span class="bench-name">${label}</span>
      <span class="bench-target" style="color:var(--text3)">${target!=null?`目標: ${target}${unit||''}`:'—'}</span>
      <span class="bench-actual" style="color:${color}">${val} ${icon}</span>
    </div>`;
  }

  return`
  <div class="sh">
    <div class="st">📈 スタッツ入力</div>

          ['defAssists','防御アシスト',ms.defAssists||0],

function saveMatchStats(){
  const keys=['elims','deaths','finalBlows','assists','healing','matchDuration','defAssists','offAssists','sleepDarts','nanoBoosts'];
  const ms={};
  keys.forEach(k=>{const el=document.getElementById('ms-'+k);if(el)ms[k]=parseFloat(el.value)||0;});
  DB.matchStats=ms;saveDB(DB);render();showToast('スタッツを保存しました！');
}
function calcVpos(){
  const v=parseFloat(document.getElementById('vpos-value').value)||0;
  const r=parseFloat(document.getElementById('vpos-risk').value)||1;
  const vpos=Math.round(v/r*100)/100;
  const el=document.getElementById('vpos-result');
  const lbl=document.getElementById('vpos-label');
  let color,text;
  if(vpos>=2.0){color='var(--green)';text='🏆 優秀 — リスクに対し非常に高い価値';}
  else if(vpos>=1.0){color='var(--blue)';text='✅ 良好 — リスクに見合う価値あり';}
  else if(vpos>=0.7){color='var(--gold)';text='⚠️ 注意 — リスクがやや価値を上回る';}
  else{color='var(--red)';text='❌ 危険 — ポジションを見直してください';}
  el.style.color=color;el.textContent=vpos.toFixed(2);
  lbl.style.color=color;lbl.textContent=text;
}
