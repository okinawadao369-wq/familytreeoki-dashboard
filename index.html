// FRED CLIENT
// ─────────────────────────────────────────────
async function fredFetch(seriesId, limit=24) {
  const url = `${FRED_PROXY}?series_id=${seriesId}&api_key=${FRED_API_KEY}&limit=${limit}&sort_order=desc&file_type=json`;
  try {
    const r = await fetch(url, {signal: AbortSignal.timeout(10000)});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    const obs = (j.observations||[]).filter(o=>o.value!='.' && o.value!='');
    return obs.map(o=>({ date:o.date, value:parseFloat(o.value) }));
  } catch(e) {
    console.warn('FRED fetch failed:',seriesId, e.message);
    return null;
  }
}

async function loadFredData() {
  const results = await Promise.allSettled([
    fredFetch('DEXJPUS',30),
    fredFetch('CPIAUCSL',24),
    fredFetch('CPILFESL',24),
    fredFetch('CUSR0000SEFV',24),
    fredFetch('UNRATE',24),
    fredFetch('CES0500000003',24),
    fredFetch('FEDFUNDS',24),
    fredFetch('DGS10',30),
    fredFetch('UMCSENT',24)
  ]);
  const keys = ['DEXJPUS','CPIAUCSL','CPILFESL','CUSR0000SEFV','UNRATE','CES0500000003','FEDFUNDS','DGS10','UMCSENT'];
  const data = {};
  let liveCount = 0;
  keys.forEach((k,i) => {
    const r = results[i];
    if(r.status==='fulfilled' && r.value && r.value.length>0) {
      data[k] = sortAsc(r.value);
      liveCount++;
    } else {
      data[k] = null;
    }
  });
  return { data, liveCount };
}

function extractLatest(series) {
  if(!series||!series.length) return null;
  return series[series.length-1].value;
}
function extractYoY(series) {
  if(!series||series.length<13) return null;
  const latest = series[series.length-1].value;
  const prev = series[series.length-13].value;
  return ((latest-prev)/prev)*100;
}
function extractMoM(series) {
  if(!series||series.length<2) return null;
  const latest = series[series.length-1].value;
  const prev = series[series.length-2].value;
  return ((latest-prev)/prev)*100;
}

async function gdeltFetch(topic, timespan='30d') {
  const q = encodeURIComponent(topic.query);
  const url = `https://api.gdeltproject.org/api/v2/doc/doc?query=${q}&mode=artlist&format=json&maxrecords=50&sort=datedesc&timespan=${timespan}&sourcelang=english`;
  try {
    const r = await fetch(url, {signal: AbortSignal.timeout(12000)});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    return j.articles || [];
  } catch(e) {
    console.warn('GDELT fetch failed:',topic.id, e.message);
    return null;
  }
}

const RISK_WORDS = ['missile','nuclear','war','attack','drill','exercise','deployment','blockade',
  'invasion','sanction','tariff','inflation','layoff','shutdown','protest','incident','warning',
  'crisis','tension','military','budget','Taiwan','China','PLA','Indo-Pacific'];
const POS_WORDS = ['agreement','dialogue','cooperation','stable','growth','cooling','decline',
  'easing','peace','support','alliance','deterrence','investment','readiness'];

function scoreArticles(articles, weight) {
  if(!articles||articles.length===0) return 18;
  const text = articles.map(a=>(a.title||'')+(a.seendate||'')).join(' ').toLowerCase();
  const riskHits = RISK_WORDS.filter(w=>text.includes(w.toLowerCase())).length;
  const posHits = POS_WORDS.filter(w=>text.includes(w.toLowerCase())).length;
  const raw = 18 + Math.log(1+articles.length)*18 + riskHits*1.9 - posHits*0.9;
  return clamp(Math.round(raw * weight), 0, 100);
}

async function loadGdeltData(timespan='30d') {
  const results = await Promise.allSettled(
    GDELT_TOPICS.map(t => gdeltFetch(t, timespan))
  );
  const scores = {};
  const articles = {};
  GDELT_TOPICS.forEach((t,i) => {
    const r = results[i];
    const arts = r.status==='fulfilled' ? r.value : null;
    articles[t.id] = arts || [];
    scores[t.id] = scoreArticles(arts, t.weight);
  });
  return { scores, articles };
}

// ─────────────────────────────────────────────
// SCORING ENGINE
// ─────────────────────────────────────────────
function calcMacroScore(fredVals) {
  const fx = fredVals.DEXJPUS || FALLBACK.DEXJPUS;
  const cpi = fredVals.CPIAUCSL || FALLBACK.CPIAUCSL;
  const coreCpi = fredVals.CPILFESL || FALLBACK.CPILFESL;
  const foodAway = fredVals.CUSR0000SEFV || FALLBACK.CUSR0000SEFV;
  const ur = fredVals.UNRATE || FALLBACK.UNRATE;
  const ahe = fredVals.CES0500000003 || FALLBACK.CES0500000003;
  const ff = fredVals.FEDFUNDS || FALLBACK.FEDFUNDS;
  const t10 = fredVals.DGS10 || FALLBACK.DGS10;
  const sent = fredVals.UMCSENT || FALLBACK.UMCSENT;
  let score = 50;
  score += clamp((fx - 130) / 2.2, 0, 18);
  score += clamp((ahe - 30) * 0.75, -8, 8);
  score += clamp((4.8 - ur) * 4, -10, 6);
  score += clamp((cpi - 2.5) * 2, -5, 8);
  score += clamp((foodAway - 3.0) * 1.5, -3, 6);
  score += clamp((sent - 60) * 0.25, -8, 6);
  score -= clamp((ff - 3.5) * 1.5, 0, 5);
  return clamp(Math.round(score), 0, 100);
}

function calcAllScores(fredVals, gdeltScores) {
  const g = gdeltScores || {};
  const eastAsia = clamp(Math.round(
    (g.taiwan_strait||50)*0.5 + (g.north_korea||50)*0.5
  ), 0, 100);
  const taiwanRisk = g.taiwan_strait || 50;
  const forwardPosture = g.indopacific || 50;
  const okinawaBase = clamp(Math.round(
    (g.usfj_okinawa||50)*0.6 + (g.henoko||50)*0.4
  ), 0, 100);
  const defenseBudget = g.us_defense_budget || 50;
  const usPolitics = g.trump_defense || 50;
  const consumerStress = g.us_economy_stress || 50;
  const macro = calcMacroScore(fredVals);
  const buyingIntent = clamp(Math.round(
    50 + (macro-50)*0.4 - (consumerStress-50)*0.2
  ), 0, 100);
  const okinawaMarket = clamp(Math.round(
    50 + forwardPosture*0.15 + okinawaBase*0.20 + defenseBudget*0.15 +
    macro*0.10 - (100-okinawaBase)*0.05 + eastAsia*0.08
  ), 0, 100);
  const fx = fredVals.DEXJPUS || FALLBACK.DEXJPUS;
  const ahe = fredVals.CES0500000003 || FALLBACK.CES0500000003;
  const cpi = fredVals.CPIAUCSL || FALLBACK.CPIAUCSL;
  const fxBoost = clamp((fx-130)/3, 0, 15);
  const wageBoost = clamp((ahe-32)*1.5, 0, 8);
  const inflationBoost = clamp((cpi-3)*2, 0, 6);
  const familyTree = clamp(Math.round(
    50 + fxBoost + wageBoost + inflationBoost + okinawaBase*0.15 + buyingIntent*0.10
    - (eastAsia>80?8:0)
  ), 0, 100);
  return {
    eastAsia, taiwanRisk, forwardPosture, okinawaBase,
    defenseBudget, usPolitics, consumerStress, buyingIntent,
    okinawaMarket, familyTree, macro
  };
}

function ScoreCircle({ score, size=80 }) {
  const r = size*0.38, cx=size/2, cy=size/2;
  const circ = 2*Math.PI*r;
  const pct = clamp(score,0,100)/100;
  const color = score>=80?'#4ade80':score>=60?'#facc15':score>=40?'#fb923c':'#f87171';
  return (
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1e2a42" strokeWidth={size*0.09}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={size*0.09}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
        strokeLinecap="round" className="score-ring"/>
      <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle"
        fill={color} fontSize={size*0.22} fontWeight="700" style={{transform:`rotate(90deg)`,transformOrigin:`${cx}px ${cy}px`}}>
        {score}
      </text>
    </svg>
  );
}

        {icon && <span className="text-lg opacity-60">{icon}</span>}
      </div>
      {loading ? (
        <div className="flex items-center gap-2 mt-3">
          <div className="spinner w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full"/>
          <span className="text-slate-400 text-sm">取得中...</span>
        </div>
      ) : (
        <>
          <div className={`text-2xl font-bold ${clr} mb-1`}>
            {value}{unit&&<span className="text-sm font-normal ml-1 opacity-70">{unit}</span>}
          </div>
          {sub && <div className="text-xs text-slate-400">{sub}</div>}
          {trend!=null && (
            <div className={`text-xs mt-1 ${trend>=0?'text-green-400':'text-red-400'}`}>

const CHART_COLORS = { primary:'#60a5fa', secondary:'#34d399', accent:'#f59e0b', danger:'#f87171', purple:'#a78bfa' };

function chartTooltipStyle() {
  return { contentStyle:{background:'#1e2538',border:'1px solid #2a3550',borderRadius:8,fontSize:11},
           labelStyle:{color:'#94a3b8'}, itemStyle:{color:'#e2e8f0'} };
}

function prepChartData(series, label, limit=24) {
  if(!series||!series.length) return [];
  const sliced = series.slice(-limit);
  return sliced.map(d=>({ date:fmtMonth(d.date), value:d.value, label }));
}

function IntelligenceKpiCards({ fredVals, fredSeries, scores, loading }) {
  const fx = extractLatest(fredSeries?.DEXJPUS) || FALLBACK.DEXJPUS;
  const fxMom = fredSeries?.DEXJPUS ? (fx - (fredSeries.DEXJPUS[fredSeries.DEXJPUS.length-2]?.value||fx)) : null;
  const cpiYoY = extractYoY(fredSeries?.CPIAUCSL);
  const ahe = extractLatest(fredSeries?.CES0500000003) || FALLBACK.CES0500000003;
  const ur = extractLatest(fredSeries?.UNRATE) || FALLBACK.UNRATE;
  const sent = extractLatest(fredSeries?.UMCSENT) || FALLBACK.UMCSENT;
  const cards = [
    { title:"USD / JPY", value: fmtNum(fx,2), sub:"対米ドル円相場", trend:fxMom, unit:"円", icon:"💱",
      score: clamp(Math.round(50+(fx-130)/3),0,100) },
    { title:"CPI YoY", value: fmtNum(cpiYoY,1), unit:"%", sub:"消費者物価前年比", icon:"📈",
      score: clamp(Math.round(50+(cpiYoY-2.5)*5),0,100) },
    { title:"平均時給", value: `$${fmtNum(ahe,2)}`, sub:"Average Hourly Earnings", icon:"💰",
      score: clamp(Math.round(50+(ahe-32)*4),0,100) },
    { title:"失業率", value: fmtNum(ur,1), unit:"%", sub:"U.S. Unemployment Rate", icon:"👥",
      score: clamp(Math.round(50+(4.5-ur)*10),0,100) },
    { title:"消費者信頼感", value: fmtNum(sent,1), sub:"Michigan Consumer Sentiment", icon:"🧭",
      score: clamp(Math.round(sent),0,100) },
    { title:"東アジア緊張", value: scores?.eastAsia||'--', sub:"台湾海峡・北朝鮮リスク", icon:"🌏",
      score: scores?.eastAsia },
    { title:"沖縄基地重要度", value: scores?.okinawaBase||'--', sub:"USFJ・嘉手納・基地動向", icon:"🛡️",
      score: scores?.okinawaBase },
    { title:"米国防予算勢い", value: scores?.defenseBudget||'--', sub:"DoD予算・国防産業", icon:"🏛️",
      score: scores?.defenseBudget },
    { title:"沖縄米軍市場安定", value: scores?.okinawaMarket||'--', sub:"市場維持・拡大判定", icon:"⚓",
      score: scores?.okinawaMarket },
    { title:"FamilyTreeOki 追い風", value: scores?.familyTree||'--', sub:"事業総合追い風スコア", icon:"🌸",
      score: scores?.familyTree },
  ];
  return (
    <div>
      <SectionHeader title="インテリジェンス KPIカード" sub="主要10指標のリアルタイムスコアリング"/>
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">
        {cards.map(c=>(
          <KpiCard key={c.title} {...c} loading={loading}/>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// FRED MACRO PANEL
// ─────────────────────────────────────────────
function FredMacroPanel({ fredSeries, fredVals, loading }) {
  const [activeChart, setActiveChart] = useState('fx');
  const charts = {
    fx: { key:'DEXJPUS', label:'USD/JPY推移', color:CHART_COLORS.primary, unit:'円' },
    cpi: { key:'CPIAUCSL', label:'CPI前年比推移', color:CHART_COLORS.danger, unit:'%YoY', yoy:true },
    ahe: { key:'CES0500000003', label:'平均時給推移', color:CHART_COLORS.secondary, unit:'$/hr' },
    ur: { key:'UNRATE', label:'失業率推移', color:CHART_COLORS.accent, unit:'%' },
    ff: { key:'FEDFUNDS', label:'FF金利推移', color:CHART_COLORS.purple, unit:'%' },
    sent: { key:'UMCSENT', label:'消費者信頼感推移', color:CHART_COLORS.secondary, unit:'pt' },
  };
  const active = charts[activeChart];
  const rawSeries = fredSeries?.[active.key];
  const chartData = useMemo(()=>{
    if(!rawSeries||!rawSeries.length) return [];
    const sliced = rawSeries.slice(-20);
    if(active.yoy) {
      const full = rawSeries;
      return sliced.map((d,i)=>{
        const idx = rawSeries.indexOf(d);
        const prev = rawSeries[idx-12];
        const yoy = prev ? ((d.value-prev.value)/prev.value*100) : null;
        return { date:fmtMonth(d.date), value: yoy!=null?parseFloat(yoy.toFixed(2)):null };
      }).filter(d=>d.value!=null);
    }
    return sliced.map(d=>({ date:fmtMonth(d.date), value:d.value }));
  }, [rawSeries, activeChart]);

  const fredTableData = Object.entries(FRED_SERIES).map(([id,meta])=>{
    const s = fredSeries?.[id];
    const latest = extractLatest(s) || FALLBACK[id];
    const mom = extractMoM(s);
    const yoy = extractYoY(s);
    return { id, ...meta, latest, mom, yoy, hasLive:!!s };
  });

  return (
    <div className="space-y-6">
      <SectionHeader title="FREDマクロ経済パネル" sub="米国主要経済指標 — FRED API直接取得"/>
      <div className="panel-card rounded-xl p-4">
        <div className="flex gap-2 flex-wrap mb-4">
          {Object.entries(charts).map(([k,c])=>(
            <button key={k} onClick={()=>setActiveChart(k)}
              className={`text-xs px-3 py-1.5 rounded-full transition-colors ${activeChart===k?'bg-blue-700 text-white':'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
              {c.label.replace('推移','').trim()}
            </button>
          ))}
        </div>
        <div className="text-sm font-semibold text-slate-200 mb-3">{active.label}</div>
        {loading||!chartData.length ? (
          <div className="flex items-center justify-center h-48 text-slate-500">
            {loading?<><span className="spinner w-5 h-5 border-2 border-blue-400 border-t-transparent rounded-full mr-2"/>読み込み中...</>:'データなし (MOCK値使用中)'}
          </div>
        ) : (
          <ResponsiveContainer width="100%" height={220}>
            <AreaChart data={chartData}>
              <defs>
                <linearGradient id={`grad-${activeChart}`} x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor={active.color} stopOpacity={0.3}/>
                  <stop offset="95%" stopColor={active.color} stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e2a42"/>
              <XAxis dataKey="date" tick={{fontSize:10,fill:'#64748b'}} interval="preserveStartEnd"/>
              <YAxis tick={{fontSize:10,fill:'#64748b'}} width={45} tickFormatter={v=>active.unit==='円'?`¥${v}`:v+active.unit}/>
              <Tooltip {...chartTooltipStyle()} formatter={v=>[`${v} ${active.unit}`,active.label]}/>
              <Area type="monotone" dataKey="value" stroke={active.color} fill={`url(#grad-${activeChart})`} strokeWidth={2} dot={false}/>
            </AreaChart>
          </ResponsiveContainer>
        )}
      </div>
      <div className="panel-card rounded-xl p-4">
        <div className="text-sm font-semibold text-slate-200 mb-3">FRED指標一覧 — 最新値</div>
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead>
              <tr className="text-slate-400 border-b border-slate-700">
                <th className="text-left py-2 pr-4">指標</th>
                <th className="text-right pr-4">最新値</th>
                <th className="text-right pr-4">前月比</th>
                <th className="text-right pr-4">前年比</th>
                <th className="text-left">単位</th>
                <th className="text-left">状態</th>
              </tr>
            </thead>
            <tbody>
              {fredTableData.map(row=>(
                <tr key={row.id} className="border-b border-slate-800 hover:bg-slate-800/30">
                  <td className="py-2 pr-4 text-slate-200 font-medium">{row.label}</td>
                  <td className="text-right pr-4 text-blue-300 font-mono font-bold">{fmtNum(row.latest,row.unit==='$/%'?2:2)}</td>
                  <td className={`text-right pr-4 font-mono ${row.mom>=0?'text-green-400':'text-red-400'}`}>{fmtPct(row.mom)}</td>
                  <td className={`text-right pr-4 font-mono ${row.yoy>=0?'text-green-400':'text-red-400'}`}>{fmtPct(row.yoy)}</td>
                  <td className="text-slate-400">{row.unit}</td>
                  <td><Badge text={row.hasLive?'LIVE':'MOCK'} color={row.hasLive?'green':'gray'}/></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// GDELT GEOPOLITICAL PANEL
// ─────────────────────────────────────────────
function GeopoliticalPanel({ gdeltScores, gdeltArticles, gdeltTimespan, onTimespanChange, scores, loading }) {
  const [selectedTopic, setSelectedTopic] = useState('usfj_okinawa');
  const topicArticles = gdeltArticles?.[selectedTopic] || [];
  const radarData = GDELT_TOPICS.map(t=>({
    subject: t.label.length>8?t.label.slice(0,8)+'…':t.label,
    score: gdeltScores?.[t.id]||50,
    fullLabel: t.label
  }));

  const geoscoreData = GDELT_TOPICS.map(t=>({
    label:t.label,
    score:gdeltScores?.[t.id]||50,
    weight:t.weight
  })).sort((a,b)=>b.score-a.score);

  return (
    <div className="space-y-6">
      <SectionHeader title="地政学インテリジェンスパネル" sub="GDELT DOC 2.0 APIによるリアルタイムニューススコアリング"/>
      <div className="flex gap-2 items-center flex-wrap">
        <span className="text-xs text-slate-400">期間:</span>
        {['1d','7d','30d','90d'].map(ts=>(
          <button key={ts} onClick={()=>onTimespanChange(ts)}
            className={`text-xs px-3 py-1 rounded-full transition-colors ${gdeltTimespan===ts?'bg-blue-700 text-white':'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
            {ts}
          </button>
        ))}
        {loading && <span className="text-xs text-slate-500 animate-pulse">取得中...</span>}
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="panel-card rounded-xl p-4">
          <div className="text-sm font-semibold text-slate-200 mb-3">地政学スコア一覧</div>
          {geoscoreData.map(d=>(
            <ScoreBar key={d.label} label={d.label} score={d.score}/>
          ))}
        </div>
        <div className="panel-card rounded-xl p-4">
          <div className="text-sm font-semibold text-slate-200 mb-3">レーダーチャート</div>
          <ResponsiveContainer width="100%" height={220}>
            <RadarChart data={radarData}>
              <PolarGrid stroke="#1e2a42"/>
              <PolarAngleAxis dataKey="subject" tick={{fontSize:9,fill:'#94a3b8'}}/>
              <Radar name="スコア" dataKey="score" stroke={CHART_COLORS.primary} fill={CHART_COLORS.primary} fillOpacity={0.25}/>
              <Tooltip {...chartTooltipStyle()} formatter={(v,n,p)=>[`${v}/100`,p.payload.fullLabel]}/>
            </RadarChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div className="panel-card rounded-xl p-4">
        <div className="flex gap-2 mb-3 flex-wrap">
          {GDELT_TOPICS.map(t=>(
            <button key={t.id} onClick={()=>setSelectedTopic(t.id)}
              className={`text-xs px-2 py-1 rounded transition-colors ${selectedTopic===t.id?'bg-blue-700 text-white':'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
              {t.label.slice(0,10)}{t.label.length>10?'…':''}
            </button>
          ))}
        </div>
        <div className="text-xs font-semibold text-slate-300 mb-2">
          {GDELT_TOPICS.find(t=>t.id===selectedTopic)?.label} — 直近ニュース
          <Badge text={`スコア: ${gdeltScores?.[selectedTopic]||'--'}`} color="blue" />
        </div>
        {topicArticles.length===0 ? (
          <div className="text-slate-500 text-xs py-4 text-center">
            {loading?'取得中...':'ニュースなし（GDELT非接続 or 0件）'}
          </div>
        ) : (
          <div className="space-y-2 max-h-64 overflow-y-auto">
            {topicArticles.slice(0,10).map((a,i)=>(
              <div key={i} className="border border-slate-700 rounded-lg p-2 hover:border-blue-700 transition-colors">
                <a href={a.url} target="_blank" rel="noopener noreferrer"
                  className="text-xs text-blue-300 hover:text-blue-200 font-medium line-clamp-2">
                  {a.title}
                </a>
                <div className="text-xs text-slate-500 mt-1">
                  {a.domain} — {fmtDate(a.seendate)}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function SourceMonitorTable() {
  const [sources, setSources] = useState(()=>{
    return OFFICIAL_SOURCES.map(s=>{
      const cached = cacheGetSource(s.id);
      return { ...s, ...cached, checkedAt: cached?.checkedAt||null, note:cached?.note||'', impact:cached?.impact||'未評価', importance:cached?.importance||3 };
    });
  });
  const [editId, setEditId] = useState(null);
  const [noteInput, setNoteInput] = useState('');
  const [impactInput, setImpactInput] = useState('');

  function handleCheck(id) {
    setSources(prev=>prev.map(s=>{
      if(s.id!==id) return s;
      const updated = { ...s, checkedAt: new Date().toLocaleString('ja-JP') };
      cacheSetSource(id, { checkedAt:updated.checkedAt, note:updated.note, impact:updated.impact, importance:updated.importance });
      return updated;
    }));
  }

  function handleSave(id) {
    setSources(prev=>prev.map(s=>{
      if(s.id!==id) return s;
      const updated = { ...s, note:noteInput, impact:impactInput };
      cacheSetSource(id, { checkedAt:s.checkedAt, note:noteInput, impact:impactInput, importance:s.importance });
      return updated;
    }));
    setEditId(null);
  }

  const catColors = { USFJ:'blue', Kadena:'blue', Housing:'green', DFAS:'yellow', DTMO:'yellow', MOD:'orange', DoD:'purple', 'White House':'red' };

  return (
    <div className="space-y-4">
      <SectionHeader title="公式ソース監視テーブル" sub="USFJ・DFAS・DTMO・MOD・DoD公式情報源の定期確認管理"/>
      <div className="panel-card rounded-xl overflow-x-auto">
        <table className="w-full text-xs">
          <thead className="bg-slate-800/50">
            <tr className="text-slate-400">
              <th className="text-left p-3">ソース名</th>
              <th className="text-left p-3">カテゴリ</th>
              <th className="text-left p-3">最終確認</th>
              <th className="text-left p-3" style={{minWidth:120}}>メモ・事業影響</th>
              <th className="text-left p-3">操作</th>
            </tr>
          </thead>
          <tbody>
            {sources.map(s=>(
              <tr key={s.id} className="border-t border-slate-800 hover:bg-slate-800/20">
                <td className="p-3">
                  <a href={s.url} target="_blank" rel="noopener noreferrer"
                    className="text-blue-400 hover:text-blue-300 font-medium">
                    {s.label} ↗
                  </a>
                </td>
                <td className="p-3"><Badge text={s.category} color={catColors[s.category]||'gray'}/></td>
                <td className="p-3 text-slate-400 whitespace-nowrap">{s.checkedAt||'未確認'}</td>
                <td className="p-3">
                  {editId===s.id ? (
                    <div className="space-y-1">
                      <input className="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1 text-white text-xs"
                        placeholder="メモ" value={noteInput} onChange={e=>setNoteInput(e.target.value)}/>
                      <input className="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1 text-white text-xs"
                        placeholder="事業影響" value={impactInput} onChange={e=>setImpactInput(e.target.value)}/>
                      <div className="flex gap-1">
                        <button onClick={()=>handleSave(s.id)} className="bg-green-700 hover:bg-green-600 text-white px-2 py-0.5 rounded text-xs">保存</button>
                        <button onClick={()=>setEditId(null)} className="bg-slate-600 hover:bg-slate-500 text-white px-2 py-0.5 rounded text-xs">キャンセル</button>
                      </div>
                    </div>
                  ) : (
                    <div>
                      {s.note && <div className="text-slate-300">{s.note}</div>}
                      {s.impact && s.impact!=='未評価' && <div className="text-yellow-400 text-xs">{s.impact}</div>}
                    </div>
                  )}
                </td>
                <td className="p-3">
                  <div className="flex gap-1">
                    <button onClick={()=>handleCheck(s.id)} className="bg-blue-800 hover:bg-blue-700 text-white px-2 py-1 rounded text-xs whitespace-nowrap">確認済み</button>
                    <button onClick={()=>{ setEditId(s.id); setNoteInput(s.note||''); setImpactInput(s.impact||''); }}
                      className="bg-slate-700 hover:bg-slate-600 text-white px-2 py-1 rounded text-xs">メモ</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="panel-card rounded-xl p-4">
          <div className="text-xs font-semibold text-slate-300 mb-3">USD/JPY推移（直近20ヶ月）</div>
          {!fxData.length ? <div className="flex h-40 items-center justify-center text-slate-500 text-xs">{loading?'読み込み中...':'データなし'}</div> : (
            <ResponsiveContainer width="100%" height={160}>
              <AreaChart data={fxData}>
                <defs><linearGradient id="fxGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor={CHART_COLORS.primary} stopOpacity={0.3}/>
                  <stop offset="95%" stopColor={CHART_COLORS.primary} stopOpacity={0}/>
                </linearGradient></defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#1e2a42"/>
                <XAxis dataKey="date" tick={{fontSize:9,fill:'#64748b'}} interval="preserveStartEnd"/>
                <YAxis domain={['auto','auto']} tick={{fontSize:9,fill:'#64748b'}} width={45} tickFormatter={v=>`¥${v}`}/>
                <Tooltip {...chartTooltipStyle()} formatter={v=>[`¥${v}`,'USD/JPY']}/>
                <Area type="monotone" dataKey="value" stroke={CHART_COLORS.primary} fill="url(#fxGrad)" strokeWidth={2} dot={false}/>
              </AreaChart>
            </ResponsiveContainer>
          )}
        </div>
        <div className="panel-card rounded-xl p-4">
          <div className="text-xs font-semibold text-slate-300 mb-3">CPI前年比推移</div>
          {!cpiData.length ? <div className="flex h-40 items-center justify-center text-slate-500 text-xs">{loading?'読み込み中...':'データなし'}</div> : (
            <ResponsiveContainer width="100%" height={160}>
              <AreaChart data={cpiData}>
                <defs><linearGradient id="cpiGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor={CHART_COLORS.danger} stopOpacity={0.3}/>
                  <stop offset="95%" stopColor={CHART_COLORS.danger} stopOpacity={0}/>
                </linearGradient></defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#1e2a42"/>
                <XAxis dataKey="date" tick={{fontSize:9,fill:'#64748b'}} interval="preserveStartEnd"/>
                <YAxis tick={{fontSize:9,fill:'#64748b'}} width={35} tickFormatter={v=>`${v}%`}/>
                <ReferenceLine y={2} stroke="#facc15" strokeDasharray="3 3" label={{value:'目標2%',fill:'#facc15',fontSize:9}}/>
                <Tooltip {...chartTooltipStyle()} formatter={v=>[`${v}%`,'CPI YoY']}/>
                <Area type="monotone" dataKey="value" stroke={CHART_COLORS.danger} fill="url(#cpiGrad)" strokeWidth={2} dot={false}/>
              </AreaChart>
            </ResponsiveContainer>
          )}
        </div>
        <div className="panel-card rounded-xl p-4">
          <div className="text-xs font-semibold text-slate-300 mb-3">失業率推移</div>
          {!urData.length ? <div className="flex h-40 items-center justify-center text-slate-500 text-xs">{loading?'読み込み中...':'データなし'}</div> : (
            <ResponsiveContainer width="100%" height={160}>
              <LineChart data={urData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1e2a42"/>
                <XAxis dataKey="date" tick={{fontSize:9,fill:'#64748b'}} interval="preserveStartEnd"/>
                <YAxis domain={['auto','auto']} tick={{fontSize:9,fill:'#64748b'}} width={35} tickFormatter={v=>`${v}%`}/>
                <Tooltip {...chartTooltipStyle()} formatter={v=>[`${v}%`,'失業率']}/>
                <Line type="monotone" dataKey="value" stroke={CHART_COLORS.accent} strokeWidth={2} dot={false}/>
              </LineChart>
            </ResponsiveContainer>
          )}
        </div>
        <div className="panel-card rounded-xl p-4">
          <div className="text-xs font-semibold text-slate-300 mb-3">地政学スコア比較</div>
          {!gdeltBarData.length ? <div className="flex h-40 items-center justify-center text-slate-500 text-xs">{loading?'読み込み中...':'スコアなし'}</div> : (
            <ResponsiveContainer width="100%" height={160}>
              <BarChart data={gdeltBarData} layout="vertical">
                <CartesianGrid strokeDasharray="3 3" stroke="#1e2a42" horizontal={false}/>
                <XAxis type="number" domain={[0,100]} tick={{fontSize:9,fill:'#64748b'}}/>
                <YAxis type="category" dataKey="name" tick={{fontSize:9,fill:'#94a3b8'}} width={55}/>
                <Tooltip {...chartTooltipStyle()} formatter={v=>[`${v}/100`,'スコア']}/>
                <Bar dataKey="score" fill={CHART_COLORS.primary} radius={[0,4,4,0]}/>
              </BarChart>
            </ResponsiveContainer>
          )}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('overview');
  const [loading, setLoading] = useState(false);
  const [fredSeries, setFredSeries] = useState(null);
  const [fredLive, setFredLive] = useState(0);
  const [gdeltScores, setGdeltScores] = useState(null);
  const [gdeltArticles, setGdeltArticles] = useState(null);
  const [gdeltLive, setGdeltLive] = useState(0);
  const [gdeltTimespan, setGdeltTimespan] = useState('30d');
  const [scores, setScores] = useState(null);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [log, setLog] = useState([]);

  function addLog(msg) {
    setLog(prev=>[{ t:new Date().toLocaleTimeString('ja-JP'), msg },...prev.slice(0,9)]);
  }

  async function fetchAll(force=false) {
    setLoading(true);
    addLog('データ取得開始...');
    let fredData={}, fLive=0, gScores=null, gArts=null, gLive=0;
    const cached = force ? null : cacheGet();
    if(cached) {
      addLog('キャッシュからデータ復元');
      fredData = cached.fredSeries||{};
      fLive = cached.fredLive||0;
      gScores = cached.gdeltScores||null;
      gArts = cached.gdeltArticles||null;
      gLive = cached.gdeltLive||0;
    } else {
      addLog('FRED APIからデータ取得中...');
      const fredResult = await loadFredData();
      fredData = fredResult.data;
      fLive = fredResult.liveCount;
      addLog(`FRED: ${fLive}/9系列取得完了`);
      addLog('GDELT APIからニューススコア取得中...');
      const gdeltResult = await loadGdeltData(gdeltTimespan);
      gScores = gdeltResult.scores;
      gArts = gdeltResult.articles;
      gLive = Object.values(gArts).filter(a=>a&&a.length>0).length;
      addLog(`GDELT: ${gLive}/8トピック取得完了`);
      cacheSet({ fredSeries:fredData, fredLive:fLive, gdeltScores:gScores, gdeltArticles:gArts, gdeltLive:gLive });
    }
    setFredSeries(fredData);
    setFredLive(fLive);
    setGdeltScores(gScores);
    setGdeltArticles(gArts);
    setGdeltLive(gLive);
    const fredVals = {};
    if(fredData.DEXJPUS) fredVals.DEXJPUS = extractLatest(fredData.DEXJPUS);
    if(fredData.CPIAUCSL) { const y=extractYoY(fredData.CPIAUCSL); if(y!=null)fredVals.CPIAUCSL=y; }
    if(fredData.CPILFESL) { const y=extractYoY(fredData.CPILFESL); if(y!=null)fredVals.CPILFESL=y; }
    if(fredData.CUSR0000SEFV) { const y=extractYoY(fredData.CUSR0000SEFV); if(y!=null)fredVals.CUSR0000SEFV=y; }
    if(fredData.UNRATE) fredVals.UNRATE = extractLatest(fredData.UNRATE);
    if(fredData.CES0500000003) fredVals.CES0500000003 = extractLatest(fredData.CES0500000003);
    if(fredData.FEDFUNDS) fredVals.FEDFUNDS = extractLatest(fredData.FEDFUNDS);
    if(fredData.DGS10) fredVals.DGS10 = extractLatest(fredData.DGS10);
    if(fredData.UMCSENT) fredVals.UMCSENT = extractLatest(fredData.UMCSENT);
    const computed = calcAllScores(fredVals, gScores);
    setScores(computed);
    const now = new Date().toLocaleString('ja-JP');
    setLastUpdate(now);
    addLog('✅ 全データ更新完了 — '+now);
    setLoading(false);
  }

  useEffect(()=>{ fetchAll(); },[]);

  const tabs = [
    { id:'overview', label:'📊 概況', short:'概況' },
    { id:'fred', label:'📈 マクロ経済', short:'FRED' },
    { id:'geo', label:'🌏 地政学', short:'地政学' },
    { id:'usfj', label:'⚓ USFJ・住宅', short:'USFJ' },
    { id:'biz', label:'💼 ビジネス影響', short:'BIZ' },
    { id:'source', label:'📋 ソース監視', short:'ソース' },
    { id:'report', label:'📝 月次レポート', short:'レポート' },
  ];

  return (
    <div className="min-h-screen" style={{background:'#0a0e1a'}}>
      <Header scores={scores} lastUpdate={lastUpdate} loading={loading}
        onRefresh={()=>fetchAll(true)} fredLive={fredLive} gdeltLive={gdeltLive}/>
      <div className="sticky top-14 z-40 bg-slate-900 border-b border-slate-800 overflow-x-auto no-print">
        <div className="max-w-screen-2xl mx-auto flex px-2">
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              className={`px-3 py-3 text-xs font-medium whitespace-nowrap transition-colors hover:text-white ${tab===t.id?'tab-active text-blue-400':'tab-inactive hover:border-slate-600'}`}>
              <span className="hidden sm:inline">{t.label}</span>
              <span className="sm:hidden">{t.short}</span>
            </button>
          ))}
        </div>
      </div>
      <main className="max-w-screen-2xl mx-auto px-3 py-4">
        {tab==='overview'&&<OverviewTab scores={scores} fredSeries={fredSeries} loading={loading}/>}
        {tab==='fred'&&<FredMacroPanel fredSeries={fredSeries} fredVals={{}} loading={loading}/>}
        {tab==='geo'&&<GeopoliticalPanel gdeltScores={gdeltScores} gdeltArticles={gdeltArticles} gdeltTimespan={gdeltTimespan} onTimespanChange={(ts)=>{setGdeltTimespan(ts);}} scores={scores} loading={loading}/>}
        {tab==='usfj'&&<UsfjOkinawaPanel scores={scores} fredVals={{}} fredSeries={fredSeries}/>}
        {tab==='biz'&&<BusinessImpactPanel scores={scores} fredVals={{}} fredSeries={fredSeries}/>}
        {tab==='source'&&<SourceMonitorTable/>}
        {tab==='report'&&<MonthlyIntelligenceReport scores={scores} fredVals={{}} fredSeries={fredSeries} gdeltScores={gdeltScores} gdeltArticles={gdeltArticles}/>}
        <div className="mt-6 panel-card rounded-xl p-3 no-print">
          <div className="text-xs text-slate-500 mb-1 font-medium">更新ログ</div>
          <div className="space-y-0.5 max-h-24 overflow-y-auto">
            {log.map((l,i)=>(
              <div key={i} className="text-xs text-slate-500">[{l.t}] {l.msg}</div>
            ))}
            {log.length===0&&<div className="text-xs text-slate-600">ログなし</div>}
          </div>
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>
</body>
</html>
