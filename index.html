async function fredObs(id,limit=36,freq=null){
  const fq=freq?`&frequency=${freq}&aggregation_method=avg`:"";
  const r=await fetch(`https://corsproxy.io/?https://api.stlouisfed.org/fred/series/observations?series_id=${id}&api_key=${FRED_KEY}&file_type=json&sort_order=desc&limit=${limit}${fq}`);
  const j=await r.json();
  return (j.observations||[]).filter(o=>o.value!=='.').map(o=>({date:o.date.slice(0,7),v:parseFloat(o.value)})).reverse();
}

async function fetchNews(){
  const proxy="https://api.rss2json.com/v1/api.json?rss_url=";
  const feed=encodeURIComponent("https://www.aljazeera.com/xml/rss/all.xml");
  const r=await fetch(proxy+feed);
  const j=await r.json();
  return (j.items||[]).slice(0,8).map(i=>({title:i.title,desc:(i.description||"").replace(/<[^>]*>/g,"").slice(0,140),date:new Date(i.pubDate).toLocaleDateString("ja-JP"),cat:i.categories?.[0]||""}));
}

function useData(){
  const [d,setD]=useState(null);
  const [loading,setL]=useState(true);
  const [ts,setTs]=useState(null);
  useEffect(()=>{
    const CK="fto_v4";
    try{const raw=localStorage.getItem(CK);if(raw){const {data,t}=JSON.parse(raw);if(Date.now()-t<CACHE_TTL){setD(data);setTs(new Date(t));setL(false);return;}}}catch(e){}
    (async()=>{
      try{
        const results=await Promise.allSettled([
          fredObs("DEXJPUS",60,"m"),fredObs("DGS10",60),fredObs("FEDFUNDS",24),
          fredObs("UNRATE",24),fredObs("CPIAUCSL",24),fredObs("DCOILWTICO",60,"m"),
          fredObs("WALCL",60),fetchNews()
        ]);
        const data={
          usdjpy:results[0].value||[],t10y:results[1].value||[],fedfunds:results[2].value||[],
          unrate:results[3].value||[],cpi:results[4].value||[],oil:results[5].value||[],
          fed_bs:results[6].value||[],news:results[7].value||[]
        };
        const t=Date.now();
        localStorage.setItem(CK,JSON.stringify({data,t}));
        setD(data);setTs(new Date(t));
      }catch(e){console.error(e);}finally{setL(false);}
    })();
  },[]);
  return{d,loading,ts};
}
